name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Package release assets
        run: |
          mkdir release
          cp main.js manifest.json styles.css release/
          cd release && zip ../recall-locus-${{ github.ref_name }}.zip ./*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            recall-locus-${{ github.ref_name }}.zip
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
          fail_on_unmatched_files: true
